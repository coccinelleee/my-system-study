<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Profile</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
* { font-family: 'Inter', sans-serif; }
</style>

</head>

<body class="bg-gray-50 min-h-screen">

<!-- HEADER -->
<header class="bg-white border-b border-gray-100 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-8 py-5 flex items-center justify-between">

        <div class="flex items-center gap-10">
            <a href="index.html" class="text-2xl font-bold text-indigo-600">My system</a>

            <!-- КАПСУЛА -->
            <div class="flex bg-gray-100 rounded-3xl p-1.5 text-sm font-medium">

                <a href="index.html" class="px-8 py-3 rounded-3xl text-gray-600 hover:text-gray-900">
                    My systems
                </a>

                <a href="message.html" class="px-8 py-3 rounded-3xl text-gray-600 hover:text-gray-900">
                    Message
                </a>

                <a href="achievements.html" class="px-8 py-3 rounded-3xl text-gray-600 hover:text-gray-900">
                    achievements
                </a>

                <!-- АКТИВНАЯ -->
                <a href="profile.html" class="px-8 py-3 rounded-3xl bg-white shadow-sm font-semibold text-gray-900">
                    profile
                </a>

            </div>
        </div>

        <!-- USER -->
        <div class="flex items-center bg-white rounded-3xl shadow-sm border px-5 py-2 gap-3">
            <div class="w-9 h-9 bg-indigo-600 text-white rounded-2xl flex items-center justify-center font-semibold">
                C
            </div>

            <div>
                <div class="font-semibold text-sm">Sara</div>
                <div class="flex items-center text-emerald-500 text-xs">
                    <div class="w-2 h-2 bg-emerald-500 rounded-full mr-1"></div>
                    Online
                </div>
            </div>
        </div>

    </div>
</header>

<!-- CONTENT -->
<div class="max-w-5xl mx-auto px-8 py-10">

    <h1 class="text-3xl font-bold mb-10">Profile</h1>

    <div class="bg-white rounded-3xl p-10 shadow-sm">

        <!-- TOP -->
        <div class="flex items-center gap-8">

            <div class="w-28 h-28 bg-gradient-to-br from-indigo-600 to-violet-600 text-white rounded-3xl flex items-center justify-center text-6xl font-bold">
                C
            </div>

            <div>
                <h2 class="text-3xl font-semibold">Sara</h2>
                <p class="text-gray-500">Ученица • 10 класс</p>

                <div class="mt-4 flex gap-6 text-sm">
                    <div><span class="font-medium">Заданий выполнено:</span> 24</div>
                    <div><span class="font-medium">Текущий стрик:</span> 7 дней</div>
                </div>
            </div>

        </div>

        <!-- BOTTOM -->
        <div class="mt-12 grid grid-cols-2 gap-8">

            <!-- LEFT -->
            <div class="space-y-6">
                <div>
                    <p class="text-xs text-gray-500 mb-1">Email</p>
                    <p class="font-medium">sara@example.com</p>
                </div>

                <div>
                    <p class="text-xs text-gray-500 mb-1">Телефон</p>
                    <p class="font-medium">+7 (XXX) XXX-XX-XX</p>
                </div>
            </div>

            <!-- RIGHT -->
            <div>
                <p class="text-xs text-gray-500 mb-3">Предпочитаемые предметы</p>

                <div class="flex flex-wrap gap-3">
                    <span class="px-5 py-2 bg-indigo-100 text-indigo-700 rounded-3xl text-sm">
                        Математика
                    </span>

                    <span class="px-5 py-2 bg-amber-100 text-amber-700 rounded-3xl text-sm">
                        Физика
                    </span>

                    <span class="px-5 py-2 bg-emerald-100 text-emerald-700 rounded-3xl text-sm">
                        Программирование
                    </span>
                </div>
            </div>

        </div>

    </div>

</div>

</body>
</html>
